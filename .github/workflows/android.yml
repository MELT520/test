name: Android Build

on:
  workflow_dispatch:
    inputs:
      project_name:
        description: 'Application name'
        required: true
        default: 'MyApp'
      url:
        description: 'Target URL'
        required: true
        default: 'https://example.com'
      package_name:
        description: 'Package name'
        required: false
        default: 'com.example.app'
      version:
        description: 'Version'
        required: false
        default: '1.0.0'
      icon_url:
        description: 'App icon URL (PNG, 512x512 recommended)'
        required: false
        default: ''

permissions:
  contents: write
  actions: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repo (includes android/ template)
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10'

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Allow sharp build scripts (pnpm v10)
        working-directory: android
        run: echo 'onlyBuiltDependencies[]=sharp' > .npmrc

      - name: Install dependencies
        working-directory: android
        run: pnpm install --no-frozen-lockfile

      - name: Download custom icon
        if: ${{ github.event.inputs.icon_url != '' }}
        working-directory: android
        run: |
          ICON_URL="${{ github.event.inputs.icon_url }}"
          echo "Downloading icon from: $ICON_URL"
          curl -fsSL -o app-icon.png "$ICON_URL" || wget -q -O app-icon.png "$ICON_URL"
          echo "Icon downloaded, size: $(wc -c < app-icon.png) bytes"

      - name: Apply project config (before pp:worker)
        working-directory: android
        run: |
          PROJECT="${{ github.event.inputs.project_name }}"
          URL="${{ github.event.inputs.url }}"
          NEW_PKG="${{ github.event.inputs.package_name }}"
          echo "Project: $PROJECT"
          echo "URL: $URL"
          # Inject URL into ppconfig.json (used by pp:worker -> app.json -> WebView)
          if [ -n "$URL" ]; then
            sed -i "s|\"webUrl\": \"https://juejin.cn/\"|\"webUrl\": \"$URL\"|" scripts/ppconfig.json
            echo "Injected URL into ppconfig.json"
          fi
          # Update app name
          if [ -f app/src/main/res/values/strings.xml ]; then
            sed -i "s/PakePlus/$PROJECT/g" app/src/main/res/values/strings.xml
          fi
          # Update applicationId (only if user changed it from default)
          if [ -f app/build.gradle.kts ] && [ -n "$NEW_PKG" ] && [ "$NEW_PKG" != "com.example.app" ]; then
            sed -i "s/applicationId = \".*\"/applicationId = \"$NEW_PKG\"/" app/build.gradle.kts
            echo "Updated applicationId to: $NEW_PKG"
          fi

      - name: Generate icons (show errors)
        working-directory: android
        run: pnpm pp:worker || echo "Icon generation had issues but continuing..."

      - name: Ensure URL in app.json
        working-directory: android
        run: |
          URL="${{ github.event.inputs.url }}"
          APP_JSON="app/src/main/assets/app.json"
          if [ -f "$APP_JSON" ] && [ -n "$URL" ]; then
            # Update webUrl even if pp:worker already did it (idempotent)
            sed -i "s|\"webUrl\": \"[^\"]*\"|\"webUrl\": \"$URL\"|" "$APP_JSON"
            echo "Verified URL in app.json: $URL"
          fi

      - name: Diagnostics - check project state
        working-directory: android
        run: |
          echo "=== Gradle version ==="
          ./gradlew --version 2>&1 | head -5
          echo "=== build.gradle.kts applicationId ==="
          grep "applicationId\|namespace" app/build.gradle.kts
          echo "=== Layout files ==="
          ls app/src/main/res/layout/
          echo "=== Kotlin source files ==="
          find app/src/main/java -name "*.kt" | sort
          echo "=== Android SDK ==="
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          echo "=== local.properties ==="
          cat local.properties 2>/dev/null || echo "(not found — will use env vars)"

      - name: Build Debug APK
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew clean assembleDebug --stacktrace

      - name: Diagnostics - check generated files
        if: always()
        working-directory: android
        run: |
          echo "=== Looking for generated R.java ==="
          find app/build -name "R.java" -path "*/debug/*" 2>/dev/null || echo "R.java NOT FOUND!"
          echo "=== Looking for any R files ==="
          find app/build -name "R.*" 2>/dev/null | head -5 || echo "No R files found"
          echo "=== Looking for generated binding classes ==="
          find app/build -name "*Binding*.java" 2>/dev/null | head -5 || echo "No binding files found"
          echo "=== Build output dirs ==="
          ls -d app/build/generated/*/ 2>/dev/null || echo "No generated dirs"

      - name: Collect APK
        run: |
          mkdir -p apk-output
          find android -name "*.apk" -exec cp {} apk-output/ \;
          ls -la apk-output/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.project_name }}-v${{ github.event.inputs.version }}
          path: apk-output/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: apk-output/*.apk
          tag_name: ${{ github.event.inputs.project_name }}-v${{ github.event.inputs.version }}
          name: '${{ github.event.inputs.project_name }} v${{ github.event.inputs.version }}'
          body: 'Auto-built APK for ${{ github.event.inputs.project_name }}'
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
