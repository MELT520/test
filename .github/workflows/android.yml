name: Android Build

on:
  workflow_dispatch:
    inputs:
      project_name:
        description: '应用名称'
        required: true
        default: 'MyApp'
      url:
        description: '目标网址'
        required: true
        default: 'https://example.com'
      package_name:
        description: '包名'
        required: false
        default: 'com.example.app'
      version:
        description: '版本号'
        required: false
        default: '1.0.0'
      icon_base64:
        description: '图标 Base64'
        required: false
        default: ''
      custom_js:
        description: '自定义 JS (Base64)'
        required: false
        default: ''

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Clone PakePlus Android template
        run: |
          git clone --depth 1 https://github.com/Sjj1024/PakePlus-Android.git template

      - name: Setup Node.js (must be before pnpm)
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Approve sharp build scripts
        working-directory: template
        run: echo "only-built-dependencies[]=sharp" >> .npmrc

      - name: Install dependencies
        working-directory: template
        run: pnpm install --no-frozen-lockfile

      - name: Generate icons
        working-directory: template
        run: pnpm pp:worker 2>/dev/null || echo "Icon generation skipped (non-critical)"

      - name: Apply project config
        working-directory: template
        run: |
          echo "Applying project: ${{ github.event.inputs.project_name }}"
          echo "Target URL: ${{ github.event.inputs.url }}"

          # Update app name in strings.xml
          if [ -f app/src/main/res/values/strings.xml ]; then
            sed -i "s/PakePlus/${{ github.event.inputs.project_name }}/g" app/src/main/res/values/strings.xml
          fi

          # Update package name in build.gradle.kts
          if [ -f app/build.gradle.kts ]; then
            sed -i "s/com\.app\.pakeplus/${{ github.event.inputs.package_name }}/g" app/build.gradle.kts
          fi

      - name: Grant execute permission for Gradle
        working-directory: template
        run: chmod +x ./gradlew

      - name: Build Debug APK
        working-directory: template
        run: ./gradlew assembleDebug --stacktrace

      - name: Find and rename APK
        working-directory: template
        run: |
          mkdir -p ../apk-output
          find app/build -name "*.apk" -exec cp {} ../apk-output/ \;
          ls -la ../apk-output/

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.project_name }}-v${{ github.event.inputs.version }}
          path: apk-output/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: apk-output/*.apk
          tag_name: ${{ github.event.inputs.project_name }}-v${{ github.event.inputs.version }}
          name: '${{ github.event.inputs.project_name }} v${{ github.event.inputs.version }}'
          body: 'Auto-built APK for ${{ github.event.inputs.project_name }}'
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
