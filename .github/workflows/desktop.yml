name: Desktop Build (Win/Mac/Linux)

on:
  workflow_dispatch:
    inputs:
      project_name:
        description: '应用名称'
        required: true
        default: 'MyApp'
      url:
        description: '目标网址'
        required: true
        default: 'https://example.com'
      version:
        description: '版本号'
        required: false
        default: '0.1.0'
      width:
        description: '窗口宽度'
        required: false
        default: '1280'
      height:
        description: '窗口高度'
        required: false
        default: '720'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: macos-latest
            target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Clone PakePlus desktop template
        run: git clone --depth 1 https://github.com/Sjj1024/PakePlus.git template

      - name: Setup Node.js (must be before pnpm)
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend deps
        working-directory: template
        run: pnpm install --no-frozen-lockfile --ignore-scripts

      - name: Build
        working-directory: template
        run: npx tauri build --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.project_name }}-${{ matrix.target }}
          path: template/src-tauri/target/${{ matrix.target }}/release/bundle/
